<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Karina, Printesa mea</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ---------- INTRO ---------- -->
  <section id="intro" class="stage">
    <h1>Salut, <span id="nick">Printesa</span>!</h1>
    <p>Apasă balonul pentru a începe călătoria noastră.</p>
    <div class="balloon" id="balloon"></div>
  </section>

  <!-- ---------- QUIZ ---------- -->
  <section id="quiz" class="stage hidden">
    <div class="question-box">
      <p class="question" id="questionText"></p>
      <div class="options" id="optionList"></div>
    </div>
    <div class="progress">
      <span id="step">1</span>/<span id="total">3</span>
    </div>
  </section>

  <!-- ---------- FINAL ---------- -->
  <section id="final" class="stage hidden">
    <h2>❤️❤️❤️</h2>
    <p>Ai ajuns la final! Unde vrei să mergem?</p>
    <div class="choices">
      <button class="choice" data-answer="Mare">Mare</button>
      <button class="choice" data-answer="Piscină">Piscină</button>
    </div>
    <p id="finalMsg" class="hidden"></p>
  </section>

  <script src="script.js"></script>
</body>
</html>
