<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Karina, Printesa mea</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ---------- HERO ---------- -->
  <header class="hero">
    <h1>Salut, <span id="nick">Printesa</span>!</h1>
    <p>Apasă pentru a începe aventura noastră digitală.</p>
    <button id="startBtn">Începe</button>
  </header>

  <!-- ---------- ANIMAŢIE INTERACTIVĂ ----------
       Balonul de sărut → inimioare -->
  <section id="animation" class="hidden">
    <div class="balloon" id="balloon"></div>
  </section>

  <!-- ---------- ÎNTREBAREA DE IUBIRE ---------- -->
  <section id="loveBox" class="hidden">
    <div class="box">
      <p class="question">M‑ă iubești?</p>
      <div class="answers">
        <button class="answer" data-value="da">Da</button>
        <button class="answer" data-value="nu">Nu</button>
      </div>
    </div>
  </section>

  <!-- ---------- SURPRIZA FINALĂ ---------- -->
  <section id="finalMsg" class="hidden">
    <h2>❤️❤️❤️</h2>
    <p>Vreau să te iau în <strong>Mare</strong> sau la <strong>Piscină</strong>!</p>
    <div class="choices">
      <button class="choice" data-answer="Mare">Mare</button>
      <button class="choice" data-answer="Piscină">Piscină</button>
    </div>
    <p id="answerMsg" class="hidden"></p>
  </section>

  <script src="script.js"></script>
</body>
</html>
